name: nanopore_metagenome_core

channels:
  - conda-forge
  - bioconda

dependencies:
  - python=3.11
  - pip

  - pandas=2.2.*
  - numpy=2.1.*
  - pyyaml=6.0.*
  - biopython=1.85
  - tqdm=4.67.*
  - rich=13.9.*

  # p01 host removal
  - minimap2=2.28
  - samtools=1.21

  # p02 taxonomy
  - kraken2=2.1.*
  - bracken=2.9

  # p03 assembly
  - flye=2.9.*

  # p05 binning
  - metabat2=2.15

  # utilities
  - seqkit=2.9.*
  - pigz
  - parallel
  - wget
  - curl
  - unzip
